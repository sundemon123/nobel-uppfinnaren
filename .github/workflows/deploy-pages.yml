name: Deploy till GitHub Pages

on:
  push:
    branches:
      - main
      - claude/game-improvements-children-kwgef6
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Samla sajtfiler (spelet är en enda självförsörjande fil)
        run: |
          mkdir -p _site
          cp index.html _site/

      - name: Konfigurera Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Ladda upp artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploya
        id: deployment
        uses: actions/deploy-pages@v4
